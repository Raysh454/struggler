name: struggler
description: "STRUGGLER: The Architect's Trial - A 2D platformer powered by AI"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  audioplayers: ^6.6.0
  flame: ^1.37.0
  flame_audio: ^2.12.0
  flutter:
    sdk: flutter
  google_generative_ai: ^0.4.7
  googleapis_auth: ^1.6.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/atlas/
    - assets/images/blocks/RockyLevel/
    - assets/images/blocks/Collectible/
    - assets/images/characters/architect/
    - assets/images/characters/skeleton/
    - assets/images/characters/goblin/
    - assets/images/characters/archer/
    - assets/images/characters/wizard/
    - assets/images/characters/nightborne/
    - assets/images/characters/bringer/SpriteSheet/
    - assets/images/characters/bringer/IndividualSprite/Idle/
    - assets/images/characters/bringer/IndividualSprite/Walk/
    - assets/images/characters/bringer/IndividualSprite/Attack/
    - assets/images/characters/bringer/IndividualSprite/Cast/
    - assets/images/characters/bringer/IndividualSprite/Hurt/
    - assets/images/characters/bringer/IndividualSprite/Death/
    - assets/images/characters/bringer/IndividualSprite/Spell/
    - assets/images/characters/guardian/
    - assets/images/characters/hope/
    - assets/images/panels/

  fonts:
    - family: Gotfridus
      fonts:
        - asset: assets/fonts/Gotfridus/Gotfridus.ttf
    - family: DungeonFont
      fonts:
        - asset: assets/fonts/DungeonFont/DungeonFont.ttf
